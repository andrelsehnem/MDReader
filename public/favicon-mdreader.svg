<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1a2e"/>
      <stop offset="100%" stop-color="#0d0b14"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Fundo escuro arredondado -->
  <rect width="64" height="64" rx="14" fill="url(#bg-grad)"/>

  <!-- "MD" em branco itálico (estilo Fraunces/serif) -->
  <text
    x="5"
    y="41"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="31"
    font-weight="700"
    font-style="italic"
    fill="#ededee"
    letter-spacing="-1.5"
  >MD</text>

  <!-- "r" em roxo violeta como marca de "reader" -->
  <text
    x="48"
    y="41"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="27"
    font-weight="700"
    font-style="italic"
    fill="url(#accent-grad)"
  >r</text>

  <!-- Linha de acento roxa embaixo -->
  <rect x="5" y="47" width="54" height="2.5" rx="1.25" fill="url(#accent-grad)" opacity="0.55"/>
</svg>
